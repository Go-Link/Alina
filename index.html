  --accent-hover: rgba(255, 255, 255, 0.5);

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}

body {
  background: linear-gradient(50deg, #FF9A9E, #FAD0C4, #FFB347, #FFD194, #FFCC99, 
    #BEE1E6, #C2E9FB, #A1C4FD, #89f7fe, #9FACE6);
  background-size: 400% 400%;
animation: gradient 15s ease infinite;
  height: 100vh;
  margin: 0;
  font-family: "Poppins", sans-serif;
  color: #1d4795;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px; 
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

  .wrap{
    position:relative;z-index:5;width:100%;
    max-width:360px; 
    text-align:center;padding:36px 20px 36px;
    zoom: 0.85; 
    -moz-transform: scale(0.85); 
  }
  
  .profile-pic{
    width:140px;height:140px;border-radius:50%;object-fit:cover;
    border:4px solid rgba(255,255,255,0.8);
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
    margin:0 auto 18px;display:block;
  }

  .links{display:flex;flex-direction:column;gap:12px;align-items:center}
.link {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 320px;
  padding: 12px 18px;
  border-radius: 30px;
  background: var(--accent);
  color: #1d4795; 
  text-decoration: none;
  font-weight: 600;
  transition: transform .18s ease, background .18s ease, box-shadow .18s;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.1); 
}

.link:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
}
  .icon{width:22px;height:22px;flex:0 0 22px;fill:#1d4795; display: flex; align-items: center; justify-content: center;}
  .label{flex:1;text-align:center}

.link.facebook:hover { background: rgba(24, 119, 242, 0.2); color: #1877F2; }

.link.website:hover { background: rgba(0, 176, 155, 0.1); color: #00b09b; }

.link.instagram:hover { background: rgba(228, 64, 95, 0.1); color: #E4405F; }

.link.phone:hover { background: rgba(52, 183, 241, 0.1); color: #34b7f1; }
.link.phone:hover .icon i { color: #34b7f1; }

  footer.footer{margin-top:28px;color:rgba(0, 0, 0, 0.95);font-size:9px}
  footer.footer a{color:inherit;text-decoration:underline}

  .social-icons {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 20px;
    align-items: center;
  }
  .social-icons a {

  display: flex;
  align-items: center;
  text-decoration: none;

.social-icons a:hover { transform: scale(1.2); }
.social-icons a.website:hover { color: #00b09b; }
.social-icons a.tripadvisor:hover { color: #34E0A1; }
.social-icons a[href*="facebook"]:hover { color: #1877F2; }
.social-icons a.instagram:hover { color: #E4405F; }
.social-icons a.location:hover { color: #EA4335; }

.description {
