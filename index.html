/* طبقة حماية عامة خفيفة جداً للموقع */
body::before {

  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.05);
  z-index: 1;
}

  /* تكبير المستطيل بنسبة 20% مع جعل الأطراف تتلاشى تماماً وتدريجياً (Feather ناعم بدون قطع) */
  .wrap{
    position:relative;
    z-index:5;
    width: 100%;
    max-width: 450px; 
    text-align:center;
    padding: 60px 45px; 
    zoom: 0.85; 
    -moz-transform: scale(0.85); 
    
    /* هندسة التدرج الشعاعي لعمل الـ Feather النقي دون حواف مقطوعة */
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.75) 45%, rgba(255,255,255,0.4) 70%, rgba(255,255,255,0) 100%);

    -webkit-backdrop-filter: blur(2px);

.link {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  padding: 12px 18px;
  border-radius: 30px;
  background: var(--accent);
  color: #1d4795; 
  text-decoration: none;
  font-weight: 700; 
  transition: transform .18s ease, background .18s ease, box-shadow .18s;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.5); 
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
}

.link:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
}
  .icon{width:22px;height:22px;flex:0 0 22px;fill:#1d4795; display: flex; align-items: center; justify-content: center;}
  .label{flex:1;text-align:center}

.link.menu:hover { background: rgba(255, 106, 0, 0.25); color: #ff6a00; }
.link.menu:hover .icon i { color: #ff6a00; }
.link.location:hover { background: rgba(234, 67, 53, 0.25); color: #EA4335; }
.link.location:hover .icon i { color: #EA4335; }
.link.whatsapp:hover { background: rgba(37, 211, 102, 0.25); color: #25D366; }
.link.whatsapp:hover .icon { fill: #25D366; }
.link.phone:hover { background: rgba(52, 183, 241, 0.2); color: #34b7f1; }
.link.phone:hover .icon i { color: #34b7f1; }

  align-items: center;

.social-icons a.menu:hover { color: #ff6a00; }
.social-icons a.location:hover { color: #EA4335; }
.social-icons a[href*="wa.me"]:hover { color: #25D366; }
.social-icons a.phone:hover { color: #34b7f1; }

h1 {

.description {
